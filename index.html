<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Corn工具庫</title>
    <style>
    /* 圖片容器：設定置中與定位基準 */
    .image-container {
        position: relative; /* 關鍵：讓內部的按鈕可以以此為基準定位 */
        width: 400px;        /* 設定圖片區塊的固定寬度 */
        height: 400px;       /* 設定圖片區塊的固定高度 */
        margin: 50px auto;    /* 關鍵：水平置中 (auto)，上下間距為 50px */
        border-radius: 15px; /* 圓角效果 (可選) */
        box-shadow: 0 8px 16px rgba(0,0,0,0.2); /* 陰影效果 (可選) */
        overflow: hidden;    /* 確保圖片不超出圓角邊框 (可選) */
    }

    /* 圖片本身：設定大小與填滿方式 */
    .image-container img {
        width: 100%;          /* 圖片寬度填滿容器 */
        height: 100%;         /* 圖片高度填滿容器 */
        object-fit: cover;    /* 關鍵：圖片會自動裁切以填滿容器，不變形 */
        display: block;      /* 移除圖片下方的預設空白 */
    }

    /* 按鈕：設定絕對定位與樣式 */
    .overlay-button {
        position: absolute;   /* 關鍵：使用絕對定位 */
        top: 50%;             /* 下移到容器的 50% */
        left: 50%;            /* 右移到容器的 50% */
        transform: translate(-50%, -50%); /* 關鍵：精確置中按鈕本身 */

        /* 半透明質感樣式 */
        background-color: rgba(255, 255, 255, 0.5); /* 關鍵：白色、50% 透明度 (rgba) */
        backdrop-filter: blur(5px);                  /* 關鍵：毛玻璃效果 (讓按鈕下方模糊) */

        /* 基本按鈕樣式 */
        border: 2px solid rgba(255, 255, 255, 0.7); /* 白色、70% 透明度邊框 */
        color: #333;                                  /* 文字顏色 */
        padding: 12px 24px;                          /* 內距 */
        border-radius: 25px;                          /* 圓角 */
        cursor: pointer;                              /* 滑鼠游標變為手型 */
        font-size: 16px;                              /* 文字大小 */
        font-weight: bold;                            /* 文字加粗 */
        outline: none;                               /* 移除預設聚焦邊框 */
        transition: all 0.3s ease;                     /* 動畫過場效果 */
    }

    /* 按鈕懸停效果 (滑鼠移上去時) */
    .overlay-button:hover {
        background-color: rgba(255, 255, 255, 0.7); /* 關鍵：懸停時降低透明度 */
        transform: translate(-50%, -50%) scale(1.05); /* 輕微放大效果 */
    }
</style>
</head>
<body style="text-align: center; margin: 30px auto; max-width: 400px;">
    <img src="1489065.jpg" alt="首頁圖" style="width: 100%; height: auto; border-radius: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.2);">

         <button onclick="switchTab('routedraw.html')">路徑生產器</button>
        <button onclick="switchTab('S2CellMap.html')">S2網格掃盆</button>
        <button onclick="switchTab('Coordinate-assignment.html')">座標分配繪製花田</button>
        <button onclick="switchTab('divide-the-work.html')">強開團分配</button>
        
    </div>

  

    <script>
        function switchTab(pageUrl) {
            document.getElementById('contentFrame').src = pageUrl;
        }
    </script>
</body>
</html>
